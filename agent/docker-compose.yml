version: "3.8"

networks:
  agent-net:
    driver: bridge

services:

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    privileged: true
    pid: host
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /cgroup:/cgroup:ro
    environment:
      - TZ=Asia/Ho_Chi_Minh
    command:
      - '--disable_metrics=disk,referenced_memory'
      - '--docker_only=true'
    restart: always
    expose:
      - 8080
    networks:
      - agent-net
    labels:
      org.label-schema.group: "monitoring"

  alloy:
    image: grafana/alloy:v1.1.1
    container_name: alloy
    privileged: true
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      #- /:/host/root:ro
    environment:
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://localhost:9090/api/v1/write}
      - LOKI_URL=${LOKI_URL:-http://localhost:3100/loki/api/v1/push}
      - AGENT_NAME=${AGENT_NAME:-edge-01}
      - TZ=Asia/Ho_Chi_Minh
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    restart: always
    networks:
      - agent-net
    labels:
      org.label-schema.group: "monitoring"
